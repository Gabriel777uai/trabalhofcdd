<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <title>Estoque Inteligente Login</title>
  <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/login.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="shortcut icon" href="assets/img/login.png" type="image/x-icon">
</head>

<body>
  <section class="required-acess">
    <div class="dropdown">
      <button type="button" class="btn btn-link dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false"
        data-bs-auto-close="outside">
        Solicite aceeso de teste
      </button>
      <form class="dropdown-menu p-4" id="form-of-testign">
        <div class="mb-3">
          <label for="FormEmail" class="form-label">Email valido</label>
          <input type="email" class="form-control" id="FormEmail" placeholder="email@example.com" name="email" required>
        </div>
        <div class="mb-3">
          <label for="nome" class="form-label">Nome completo</label>
          <input type="text" class="form-control" id="nome" placeholder="Nome completo" name="nome" required>
        </div>
        <div class="mb-3">
          <p>Sua senha de acesso de testes será enviada pelo email, depois de 4 dias sem uso sua conta será excluida!
          </p>
        </div>
        <button type="submit" class="btn btn-primary" id="send-btn">Enviar</button>
      </form>
    </div>
  </section> 

  <section class="body-form">
    <div class="login-container">
      <h1>Estoque Inteligente</h1>

      <form id="form-login" class="needs-validation" novalidate>
        <label for="validationCustom01">Usuário</label>
        <input type="text" id="validationCustom01" name="login" placeholder="Digite seu usuário" required />
        <div class="invalid-feedback">Por favor, digite seu usuário.</div>

        <label for="validationCustom02">Senha</label>
        <input type="password" id="validationCustom02" name="senha" placeholder="Digite sua senha" required />
        <div class="invalid-feedback">Por favor, digite sua senha.</div>

        <div class="checkbox-flex">
          <label for="mostrarSenha">Mostrar Senha</label>
          <input type="checkbox" id="mostrarSenha" name="mostrarSenha" />
        </div>

        <button id="btnLogin" type="submit">Entrar</button>
      </form>

      <div class="footer-text">
        © 2026 - Sistema Interno
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="assets/js/login.js"></script>
  <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
</body>

</html>
